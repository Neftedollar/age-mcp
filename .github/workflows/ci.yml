name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build --configuration Release

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # required for NuGet trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Pack
        run: dotnet pack --configuration Release --output ./nupkg

      - name: Get NuGet token via OIDC
        id: nuget-token
        run: |
          echo "Requesting OIDC token..."
          OIDC_RESPONSE=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=nuget.org")
          echo "OIDC response (first 200 chars): ${OIDC_RESPONSE:0:200}"

          OIDC_TOKEN=$(echo "$OIDC_RESPONSE" | jq -r '.value')

          echo "Exchanging OIDC token with NuGet..."
          NUGET_RESPONSE=$(curl -sS -X POST \
            "https://www.nuget.org/packages/manage/publish-oidc-key" \
            -H "Content-Type: application/json" \
            -d "{\"packageName\": \"AgeMcp\", \"oidcToken\": \"$OIDC_TOKEN\"}")
          echo "NuGet response (first 200 chars): ${NUGET_RESPONSE:0:200}"

          NUGET_TOKEN=$(echo "$NUGET_RESPONSE" | jq -r '.apiKey')

          echo "::add-mask::$NUGET_TOKEN"
          echo "token=$NUGET_TOKEN" >> "$GITHUB_OUTPUT"

      - name: Push to NuGet
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ steps.nuget-token.outputs.token }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
